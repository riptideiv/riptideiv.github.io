<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>researcher connections — riptideiv</title>
    <meta name="description"
        content="Find the shortest connection path between any two researchers via co-authorship, citations, and shared institutions.">
    <link rel="icon" href="/pages/img/icon.png" type="image/x-icon">
    <link rel="stylesheet" href="/style.css">
    <style>
        /* Full-viewport canvas layout — overrides site's .page wrapper */
        html, body { height: 100%; overflow: hidden; }

        #app-layout {
            position: fixed;
            top: 44px; /* site nav height */
            left: 0; right: 0; bottom: 0;
            display: flex;
        }

        /* ── Sidebar ─────────────────────────────────────────── */
        #sidebar {
            width: 260px;
            min-width: 220px;
            background: #fff;
            border-right: 1px solid #e8e8e8;
            padding: 14px 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
        }

        .sidebar-back {
            font-size: 13px;
            color: #888;
            text-decoration: none;
            margin-bottom: 2px;
        }
        .sidebar-back:hover { text-decoration: underline; }
        .sidebar-back:visited { color: #888; }

        .sidebar-title {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #bbb;
        }

        #search-wrapper { position: relative; }

        #search-input {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 13px;
            font-family: inherit;
            outline: none;
            color: #1a1a1a;
            background: #fff;
        }
        #search-input:focus { border-color: #222; }

        .dropdown {
            position: absolute;
            top: calc(100% + 4px);
            left: 0; right: 0;
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            list-style: none;
            z-index: 200;
            box-shadow: 0 2px 8px rgba(0,0,0,0.10);
            max-height: 220px;
            overflow-y: auto;
        }
        .dropdown:empty { display: none; }
        .dropdown li {
            padding: 8px 10px;
            cursor: pointer;
            font-size: 12px;
            line-height: 1.4;
            border-bottom: 1px solid #f5f5f5;
        }
        .dropdown li:last-child { border-bottom: none; }
        .dropdown li:hover { background: #f5f5f5; }

        #origin-chips { display: flex; flex-direction: column; gap: 3px; }

        .researcher-chip {
            padding: 5px 8px;
            background: #f0f0f0;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            font-size: 12px;
            color: #333;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .section-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #bbb;
            margin-top: 4px;
        }

        #edge-toggles { display: flex; flex-direction: column; gap: 5px; }
        #edge-toggles label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #555;
            cursor: pointer;
        }
        #edge-toggles input[type="checkbox"] { accent-color: #222; cursor: pointer; }

        #node-detail {
            border-top: 1px solid #f0f0f0;
            padding-top: 10px;
            margin-top: 4px;
        }
        #node-detail h3 { font-size: 13px; font-weight: 600; color: #1a1a1a; margin-bottom: 5px; line-height: 1.3; }
        #node-detail div { font-size: 12px; color: #666; margin-bottom: 3px; }
        #node-detail a { display: inline-block; margin-top: 6px; font-size: 12px; color: #333; text-decoration: underline; }

        /* ── Graph area ──────────────────────────────────────── */
        #graph-area { flex: 1; position: relative; background: #fafafa; }
        #cy { width: 100%; height: 100%; }

        #progress-overlay {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.92);
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 7px 16px;
            font-size: 12px;
            color: #555;
            z-index: 50;
            pointer-events: none;
            white-space: nowrap;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .hidden { display: none !important; }

        #cy-tooltip {
            position: fixed;
            background: rgba(18, 18, 18, 0.90);
            color: #f0f0f0;
            padding: 6px 10px;
            border-radius: 5px;
            font-size: 11px;
            line-height: 1.6;
            pointer-events: none;
            z-index: 9999;
            max-width: 240px;
            word-wrap: break-word;
            display: none;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.35);
        }
    </style>
</head>

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-KLB1BYEHEQ"></script>
<script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-KLB1BYEHEQ');
</script>

<body>
    <div id="topbar"></div>

    <div id="app-layout">
        <div id="sidebar">
            <a class="sidebar-back" href="/">← back</a>
            <h2 class="sidebar-title">Researcher Connections</h2>

            <div id="search-wrapper">
                <input type="text" id="search-input" placeholder="Add a researcher…" autocomplete="off">
                <ul id="search-dropdown" class="dropdown"></ul>
            </div>

            <div id="origin-chips"></div>

            <div class="section-label">Edge types</div>
            <div id="edge-toggles">
                <label><input type="checkbox" id="edge-coauthor" checked> Co-authorship</label>
                <label><input type="checkbox" id="edge-citation" checked> Citations</label>
                <label><input type="checkbox" id="edge-institution" checked> Institution</label>
            </div>

            <div id="node-detail" class="hidden">
                <h3 id="detail-name"></h3>
                <div id="detail-meta"></div>
                <a id="detail-link" href="#" target="_blank" rel="noopener">View on OpenAlex →</a>
            </div>

            <div style="margin-top: auto; padding-top: 12px; border-top: 1px solid #f0f0f0;">
                <div style="font-size: 11px; color: #bbb; line-height: 1.5;">
                    <em>created with help from <a href="https://github.com/owlsowo" target="_blank" rel="noopener" style="color:#bbb;">owlsowo</a></em>
                </div>
            </div>
        </div>

        <div id="graph-area">
            <div id="progress-overlay" class="hidden">
                <span id="progress-text">Loading…</span>
            </div>
            <div id="cy"></div>
        </div>
    </div>

    <script src="https://unpkg.com/cytoscape@3.30.2/dist/cytoscape.min.js"></script>
    <script>window.RESEARCHER_API_BASE = 'https://researchers-degree-of-separation.onrender.com';</script>
    <script src="/tools/researchers.js"></script>

    <script>
        fetch('/pages/top-bar.html')
            .then(r => r.text())
            .then(html => {
                const tmp = document.createElement('div');
                tmp.innerHTML = html;
                const nav = tmp.querySelector('nav');
                if (nav) document.getElementById('topbar').appendChild(nav);
            });
    </script>
</body>

</html>

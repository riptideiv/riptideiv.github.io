<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>researcher connections — riptideiv</title>
    <meta name="description"
        content="Find the shortest connection path between any two researchers via co-authorship, citations, and shared institutions.">
    <link rel="icon" href="/pages/img/icon.png" type="image/x-icon">
    <link rel="stylesheet" href="/style.css">
    <style>
        /* ── Search fields ───────────────────────────────────────────────── */
        .search-row {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .researcher-field {
            flex: 1;
        }

        .researcher-field label {
            display: block;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #666;
            margin-bottom: 0.4rem;
        }

        .connector {
            padding-top: 2.2rem;
            color: #bbb;
            font-size: 1.2rem;
        }

        .autocomplete {
            position: relative;
        }

        input[type="text"] {
            width: 100%;
            padding: 0.6rem 0.8rem;
            background: #fff;
            border: 1px solid #bbb;
            border-radius: 4px;
            color: #222;
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: #222;
        }

        .dropdown {
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            right: 0;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 4px;
            list-style: none;
            z-index: 100;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .dropdown:empty {
            display: none;
        }

        .dropdown li {
            padding: 0.6rem 0.8rem;
            cursor: pointer;
            transition: background 0.15s;
            margin-bottom: 0;
        }

        .dropdown li:hover {
            background: #f5f5f5;
        }

        .dropdown .author-name {
            font-weight: 600;
            font-size: 0.9rem;
            color: #222;
        }

        .dropdown .author-meta {
            font-size: 0.78rem;
            color: #666;
            margin-top: 0.1rem;
        }

        .selected-badge {
            margin-top: 0.4rem;
            padding: 0.35rem 0.6rem;
            background: #f0f0f0;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            font-size: 0.82rem;
            color: #333;
        }

        /* ── Edge toggles ────────────────────────────────────────────────── */
        .edge-toggles {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .edge-toggles-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #666;
        }

        .edge-toggle {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            font-size: 0.9rem;
            color: #333;
            cursor: pointer;
            user-select: none;
        }

        .edge-toggle input[type="checkbox"] {
            accent-color: #222;
            cursor: pointer;
        }

        /* ── Buttons ─────────────────────────────────────────────────────── */
        #find-btn {
            display: block;
            width: 100%;
            padding: 0.7rem;
            background: #222;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, opacity 0.2s;
        }

        #find-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        #find-btn:not(:disabled):hover {
            background: #333;
        }

        #reset-btn {
            display: block;
            width: 100%;
            padding: 0.7rem;
            background: #f0f0f0;
            color: #555;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 0.95rem;
            cursor: pointer;
            margin-top: 1rem;
            transition: background 0.15s;
        }

        #reset-btn:hover {
            background: #e0e0e0;
            color: #333;
        }

        /* ── Progress log ────────────────────────────────────────────────── */
        #progress-area {
            margin-top: 1.5rem;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 1rem;
            font-family: monospace;
            font-size: 0.85rem;
            color: #555;
            max-height: 200px;
            overflow-y: auto;
        }

        .progress-line {
            padding: 0.15rem 0;
        }

        /* ── Result chain ────────────────────────────────────────────────── */
        #result-area {
            margin-top: 1.5rem;
        }

        .chain {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .chain-node {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .chain-author {
            font-weight: 700;
            font-size: 1.05rem;
            color: #222;
            text-decoration: none;
        }

        .chain-author:visited {
            color: #222;
        }

        .chain-author:hover {
            text-decoration: underline;
        }

        .chain-connection {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin: 0.4rem 0;
            padding-left: 0.5rem;
            color: #666;
            font-size: 0.85rem;
        }

        .chain-arrow {
            color: #222;
            font-size: 1.1rem;
        }

        .chain-label {
            font-style: italic;
            color: #888;
        }

        .chain-hop-label {
            color: #666;
            font-size: 0.85rem;
            margin-top: 0.5rem;
            text-align: center;
        }

        .error-message {
            color: #c0392b;
            background: #fdf0ef;
            border: 1px solid #e5b3ae;
            border-radius: 4px;
            padding: 0.75rem 1rem;
            margin-top: 1rem;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-KLB1BYEHEQ"></script>
<script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());

<body>
    <div id="topbar"></div>
    <div class="page">
        <a class="back-link" href="/">← Back to home</a>

        <h1>Researcher Connections</h1>
        <p>Find how any two researchers are connected through co-authorship, citations, and shared institutions.</p>

        <section id="search-form" style="margin-top: 24px;">
            <div class="search-row">
                <div class="researcher-field" id="field-a">
                    <label for="input-a">Researcher A</label>
                    <div class="autocomplete">
                        <input type="text" id="input-a" placeholder="Type a name..." autocomplete="off">
                        <ul class="dropdown" id="dropdown-a"></ul>
                    </div>
                    <div class="selected-badge hidden" id="badge-a"></div>
                </div>
                <div class="connector">→</div>
                <div class="researcher-field" id="field-b">
                    <label for="input-b">Researcher B</label>
                    <div class="autocomplete">
                        <input type="text" id="input-b" placeholder="Type a name..." autocomplete="off">
                        <ul class="dropdown" id="dropdown-b"></ul>
                    </div>
                    <div class="selected-badge hidden" id="badge-b"></div>
                </div>
            </div>
            <div class="edge-toggles">
                <span class="edge-toggles-label">Edge types</span>
                <label class="edge-toggle"><input type="checkbox" id="edge-coauthor" checked> Co-authorship</label>
                <label class="edge-toggle"><input type="checkbox" id="edge-citation" checked> Citations</label>
                <label class="edge-toggle"><input type="checkbox" id="edge-institution" checked> Shared
                    institution</label>
            </div>
            <button id="find-btn" disabled>Find Connection</button>
            <br><br><br>
            <div><i>created with help from smart guy at duke kunshan: https://github.com/owlsowo</i></div>
        </section>

        <section id="progress-area" class="hidden">
            <div id="progress-log"></div>
        </section>

        <section id="result-area" class="hidden">
            <div id="path-chain"></div>
            <button id="reset-btn">↩ Search again</button>
        </section>
    </div>

    <script>window.RESEARCHER_API_BASE = 'https://researchers-degree-of-separation.onrender.com';</script>
    <script src="/tools/researchers.js"></script>

    <script>
        fetch('/pages/top-bar.html')
            .then(r => r.text())
            .then(html => {
                const tmp = document.createElement('div');
                tmp.innerHTML = html;
                const nav = tmp.querySelector('nav');
                if (nav) document.getElementById('topbar').appendChild(nav);
            });
    </script>
</body>

</html>
